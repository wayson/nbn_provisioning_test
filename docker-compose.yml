services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: flip_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./own_services:/var/www
    networks:
      - flip_network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: flip_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./own_services:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - flip_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: flip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flip_network

  redis:
    image: redis:7-alpine
    container_name: flip_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flip_network

networks:
  flip_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
